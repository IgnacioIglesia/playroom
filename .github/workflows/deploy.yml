name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
