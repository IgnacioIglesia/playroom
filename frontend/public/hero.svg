  <text x="300" y="372" text-anchor="middle" font-size="28">🎲</text>
  <text x="380" y="372" text-anchor="middle" font-size="28">🕵️</text>
  <text x="460" y="372" text-anchor="middle" font-size="28">🧠</text>
