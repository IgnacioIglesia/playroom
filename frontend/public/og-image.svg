<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#07070f"/>
  <!-- Radial glow -->
  <radialGradient id="glow" cx="50%" cy="30%" r="55%" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#07070f" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#8b5cf6" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Lightning bolt logo -->
  <g transform="translate(540, 120)">
    <path d="M36 4L12 36h16L20 60l28-36H32L36 4z" fill="#8b5cf6" opacity="0.9"/>
  </g>
  <!-- Title -->
  <text x="600" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">PlayRoom</text>
  <!-- Subtitle -->
  <text x="600" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#9ca3af" text-anchor="middle" letter-spacing="2">Jugá con tus amigos</text>
  <!-- Game pills -->
  <g transform="translate(600, 460)">
    <!-- Truco pill -->
    <rect x="-340" y="0" width="140" height="44" rx="22" fill="#1e1040" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="-270" y="27" font-family="system-ui, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="600">Truco</text>
    <!-- Poker pill -->
    <rect x="-180" y="0" width="140" height="44" rx="22" fill="#1e1040" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="-110" y="27" font-family="system-ui, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="600">Poker</text>
    <!-- Sudoku pill -->
    <rect x="-20" y="0" width="140" height="44" rx="22" fill="#1e1040" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="50" y="27" font-family="system-ui, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="600">Sudoku</text>
    <!-- Uno pill -->
    <rect x="140" y="0" width="140" height="44" rx="22" fill="#1e1040" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="210" y="27" font-family="system-ui, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="600">Uno</text>
  </g>
</svg>
